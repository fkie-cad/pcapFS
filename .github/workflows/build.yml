name: Platform Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 20.04
            image: ubuntu:20.04
          - name: Ubuntu 22.04
            image: ubuntu:22.04
          - name: Ubuntu 24.04
            image: ubuntu:24.04
          - name: Ubuntu 26.04
            image: ubuntu:26.04
          - name: Debian 11
            image: debian:bullseye
          - name: Debian 12
            image: debian:bookworm
          - name: Debian 13
            image: debian:trixie
          - name: Kali Linux
            image: kalilinux/kali-rolling
          - name: Fedora 43
            image: fedora:43
          - name: Fedora 44
            image: fedora:44
          - name: CentOS Stream 9
            image: quay.io/centos/centos:stream9
          - name: CentOS Stream 10
            image: quay.io/centos/centos:stream10
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          docker run --rm --privileged --device /dev/fuse \
            -v "$GITHUB_WORKSPACE:/pcapfs" \
            -w /pcapfs \
            "${{ matrix.image }}" \
            ./.github/scripts/ci-run.sh
